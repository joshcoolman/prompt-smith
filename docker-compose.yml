services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      # Fixed, non-sensitive default — this container only ever binds to
      # localhost. Override with a POSTGRES_PASSWORD env var if you'd
      # rather match an existing .env.local value.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-prompt_smith}
    ports:
      - '5432:5432'
    volumes:
      - prompt_smith_pg_data:/var/lib/postgresql/data
    # Lets `docker compose up -d --wait` block until Postgres actually
    # accepts connections, so `pnpm dev:local` can run migrations straight
    # after without racing the container's startup.
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-prompt_smith}',
        ]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  prompt_smith_pg_data:
