services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      # Fixed, non-sensitive default — this container only ever binds to
      # localhost. Override with a POSTGRES_PASSWORD env var if you'd
      # rather match an existing .env.local value.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-prompt_smith}
    ports:
      - '5432:5432'
    volumes:
      - prompt_smith_pg_data:/var/lib/postgresql/data

volumes:
  prompt_smith_pg_data:
